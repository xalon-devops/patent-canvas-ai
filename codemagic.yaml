workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      java: 17
      node: 22.11.0
      vars:
        ANDROID_KEYSTORE_PASSWORD: $ANDROID_KEYSTORE_PASSWORD
        ANDROID_KEY_ALIAS: $ANDROID_KEY_ALIAS
        ANDROID_KEY_PASSWORD: $ANDROID_KEY_PASSWORD
      android_signing:
        - appship_keystore
    scripts:
      - name: Download and extract project
        script: |
          echo "Source: $APP_ZIP_URL"
          if echo "$APP_ZIP_URL" | grep -qiE '\.(zip|tar\.gz)$'; then
            curl -L -o project.zip "$APP_ZIP_URL"
            mkdir -p _tmp_extract
            unzip -o project.zip -d _tmp_extract
            NESTED=$(find _tmp_extract -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -n "$NESTED" ] && [ -f "$NESTED/package.json" ]; then
              cp -a "$NESTED"/. .
            else
              cp -a _tmp_extract/. .
            fi
            rm -rf _tmp_extract project.zip
          else
            echo "Detected live URL — generating Capacitor shell"
            npm init -y
            npm install @capacitor/core @capacitor/cli @capacitor/android
            mkdir -p www
            cat > www/index.html << HTMLEOF
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>${APP_NAME:-App}</title><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden}</style></head>
          <body><script>window.location.href="${APP_ZIP_URL}";</script></body></html>
          HTMLEOF
            cat > capacitor.config.json << CAPEOF
          {"appId":"${BUNDLE_ID:-com.app.default}","appName":"${APP_NAME:-App}","webDir":"www","server":{"url":"${APP_ZIP_URL}","cleartext":true}}
          CAPEOF
          fi
          ls -la
      - name: Install dependencies
        script: npm ci || npm install
      - name: Add and sync Capacitor
        script: |
          rm -rf android
          npx cap add android || true
          npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      scripts:
        - name: Notify build result
          script: |
            if [ "$CM_BUILD_STEP_STATUS" == "success" ]; then STATUS="finished"; else STATUS="failed"; fi
            PAYLOAD=$(python3 -c "import json; print(json.dumps({'buildId':'$CM_BUILD_ID','status':'$STATUS','platform':'android','workflowId':'android-release','environment':{'variables':{'USER_APP_ID':'$USER_APP_ID'}},'artefacts':[{'url':'''$CM_ARTIFACT_LINKS''','type':'apk'}],'finishedAt':'$(date -u +%Y-%m-%dT%H:%M:%SZ)'}))")
            curl -X POST "$SUPABASE_URL/functions/v1/codemagic-webhook" -H "Content-Type: application/json" -d "$PAYLOAD"

  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 22.11.0
      cocoapods: default
    scripts:
      - name: Download and extract project
        script: |
          echo "Source: $APP_ZIP_URL"
          if echo "$APP_ZIP_URL" | grep -qiE '\.(zip|tar\.gz)$'; then
            curl -L -o project.zip "$APP_ZIP_URL"
            mkdir -p _tmp_extract
            unzip -o project.zip -d _tmp_extract
            NESTED=$(find _tmp_extract -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -n "$NESTED" ] && [ -f "$NESTED/package.json" ]; then
              cp -a "$NESTED"/. .
            else
              cp -a _tmp_extract/. .
            fi
            rm -rf _tmp_extract project.zip
          else
            echo "Detected live URL — generating Capacitor shell"
            npm init -y
            npm install @capacitor/core @capacitor/cli @capacitor/ios
            mkdir -p www
            cat > www/index.html << HTMLEOF
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>${APP_NAME:-App}</title><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden}</style></head>
          <body><script>window.location.href="${APP_ZIP_URL}";</script></body></html>
          HTMLEOF
            cat > capacitor.config.json << CAPEOF
          {"appId":"${BUNDLE_ID:-com.app.default}","appName":"${APP_NAME:-App}","webDir":"www","server":{"url":"${APP_ZIP_URL}","cleartext":true}}
          CAPEOF
          fi
          ls -la
      - name: Install dependencies
        script: npm ci || npm install
      - name: Add and sync Capacitor
        script: |
          rm -rf ios
          npx cap add ios || true
          npx cap sync ios
          cd ios/App
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = ${TEAM_ID};/g" App.xcodeproj/project.pbxproj
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          printf '%s' "$APP_STORE_CONNECT_KEY_CONTENT" | base64 -D > /tmp/AuthKey.p8
          if [ -z "$CM_CERTIFICATE_PRIVATE_KEY" ]; then
            openssl genrsa -out /tmp/cert_key.pem 2048
          else
            echo "$CM_CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --key-id "$APP_STORE_CONNECT_KEY_ID" --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" --private-key "$(cat /tmp/AuthKey.p8)" --certificate-key "$(cat /tmp/cert_key.pem)" --create
          keychain add-certificates
          cd ios/App
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd ios/App
          xcode-project build-ipa --workspace App.xcworkspace --scheme App --archive-flags "CODE_SIGN_STYLE=Manual"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/**/*.xcarchive
    publishing:
      scripts:
        - name: Notify build result
          script: |
            if [ "$CM_BUILD_STEP_STATUS" == "success" ]; then STATUS="finished"; else STATUS="failed"; fi
            PAYLOAD=$(python3 -c "import json; print(json.dumps({'buildId':'$CM_BUILD_ID','status':'$STATUS','platform':'ios','workflowId':'ios-release','environment':{'variables':{'USER_APP_ID':'$USER_APP_ID'}},'artefacts':[{'url':'''$CM_ARTIFACT_LINKS''','type':'ipa'}],'finishedAt':'$(date -u +%Y-%m-%dT%H:%M:%SZ)'}))")
            curl -X POST "$SUPABASE_URL/functions/v1/codemagic-webhook" -H "Content-Type: application/json" -d "$PAYLOAD"
