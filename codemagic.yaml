workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      java: 17
      node: 22.11.0
      vars:
        CM_BUILD_DIR: /tmp/build/android-release
      android_signing:
        - appship_keystore

    scripts:
      - name: Prepare workspace
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR"

      - name: Download and extract project
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          echo "Source: $APP_ZIP_URL"
          if echo "$APP_ZIP_URL" | grep -qiE '\.(zip|tar\.gz)(\?.*)?$'; then
            echo "Detected ZIP/archive source"
            curl -L "$APP_ZIP_URL" -o project.zip
            mkdir -p _tmp_extract
            unzip -o project.zip -d _tmp_extract
            NESTED=$(find _tmp_extract -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -n "$NESTED" ] && [ -f "$NESTED/package.json" ]; then
              cp -a "$NESTED"/. .
            else
              cp -a _tmp_extract/. .
            fi
            rm -rf _tmp_extract project.zip
          else
            echo "Detected live URL source — generating Capacitor shell"
            npm init -y
            npm install @capacitor/core @capacitor/cli @capacitor/android
            mkdir -p www
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>'"${APP_NAME:-App}"'</title><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}iframe{border:0;width:100%;height:100%}</style></head><body><iframe src="'"${APP_ZIP_URL}"'" allow="camera;microphone;geolocation"></iframe></body></html>' > www/index.html
            printf '{"appId":"%s","appName":"%s","webDir":"www","server":{"url":"%s","cleartext":true}}' "${PACKAGE_NAME:-com.app.default}" "${APP_NAME:-App}" "${APP_ZIP_URL}" > capacitor.config.json
          fi
          ls -la

      - name: Install dependencies
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web assets if present
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script found — skipping web build"
          fi

      - name: Add and sync Capacitor Android
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          rm -rf android
          rm -f capacitor.config.ts
          echo "=== Capacitor config ==="
          cat capacitor.config.json
          echo "=== Adding Android platform ==="
          npx cap add android
          echo "=== Syncing Android platform ==="
          npx cap sync android
          test -d android || (echo "FATAL: android directory not created" && exit 1)

      - name: Build Android release
        script: |
          set -e
          cd "$CM_BUILD_DIR/android"
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - /tmp/build/android-release/android/app/build/outputs/**/*.apk
      - /tmp/build/android-release/android/app/build/outputs/**/*.aab

    publishing:
      scripts:
        - name: Notify build result
          script: |
            if [ "$CM_BUILD_STEP_STATUS" = "success" ]; then
              export STATUS="finished"
            else
              export STATUS="failed"
            fi
            PAYLOAD=$(python3 -c "
            import json, os, datetime
            print(json.dumps({
              'buildId': os.environ.get('CM_BUILD_ID', ''),
              'status': os.environ.get('STATUS', 'failed'),
              'platform': 'android',
              'workflowId': 'android-release',
              'environment': {'variables': {'USER_APP_ID': os.environ.get('USER_APP_ID', '')}},
              'artefacts': [{'url': os.environ.get('CM_ARTIFACT_LINKS', ''), 'type': 'aab'}],
              'finishedAt': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
            }))
            ")
            curl -X POST "$SUPABASE_URL/functions/v1/codemagic-webhook" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"

  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22.11.0
      cocoapods: default
      vars:
        CM_BUILD_DIR: /tmp/build/ios-release

    scripts:
      - name: Prepare workspace
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR"

      - name: Download and extract project
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          echo "Source: $APP_ZIP_URL"
          if echo "$APP_ZIP_URL" | grep -qiE '\.(zip|tar\.gz)(\?.*)?$'; then
            echo "Detected ZIP/archive source"
            curl -L "$APP_ZIP_URL" -o project.zip
            mkdir -p _tmp_extract
            unzip -o project.zip -d _tmp_extract
            NESTED=$(find _tmp_extract -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -n "$NESTED" ] && [ -f "$NESTED/package.json" ]; then
              cp -a "$NESTED"/. .
            else
              cp -a _tmp_extract/. .
            fi
            rm -rf _tmp_extract project.zip
          else
            echo "Detected live URL source — generating Capacitor shell"
            npm init -y
            npm install @capacitor/core @capacitor/cli @capacitor/ios
            mkdir -p www
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>'"${APP_NAME:-App}"'</title><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}iframe{border:0;width:100%;height:100%}</style></head><body><iframe src="'"${APP_ZIP_URL}"'" allow="camera;microphone;geolocation"></iframe></body></html>' > www/index.html
            printf '{"appId":"%s","appName":"%s","webDir":"www","server":{"url":"%s","cleartext":true}}' "${BUNDLE_ID:-com.app.default}" "${APP_NAME:-App}" "${APP_ZIP_URL}" > capacitor.config.json
          fi
          ls -la

      - name: Install dependencies
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Build web assets if present
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script found — skipping web build"
          fi

      - name: Add and sync Capacitor iOS
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          rm -rf ios
          rm -f capacitor.config.ts
          echo "=== Capacitor config ==="
          cat capacitor.config.json
          echo "=== Adding iOS platform ==="
          npx cap add ios
          echo "=== Syncing iOS platform ==="
          npx cap sync ios
          test -d ios/App || (echo "FATAL: ios/App was not created" && exit 1)
          cd ios/App
          if [ -f App.xcodeproj/project.pbxproj ]; then
            sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g" App.xcodeproj/project.pbxproj || true
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};/g" App.xcodeproj/project.pbxproj || true
            if [ -n "${TEAM_ID:-}" ]; then
              sed -i '' "s/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = ${TEAM_ID};/g" App.xcodeproj/project.pbxproj || true
            fi
          fi

      - name: Install CocoaPods if needed
        script: |
          set -e
          cd "$CM_BUILD_DIR/ios/App"
          if [ -f Podfile ]; then
            echo "Podfile found — running pod install"
            pod install
          else
            echo "No Podfile found — skipping pod install"
          fi

      - name: Validate signing variables
        script: |
          set -e
          [ -n "${APP_STORE_CONNECT_KEY_CONTENT:-}" ] || (echo "ERROR: Missing APP_STORE_CONNECT_KEY_CONTENT" && exit 1)
          [ -n "${APP_STORE_CONNECT_KEY_ID:-}" ] || (echo "ERROR: Missing APP_STORE_CONNECT_KEY_ID" && exit 1)
          [ -n "${APP_STORE_CONNECT_ISSUER_ID:-}" ] || (echo "ERROR: Missing APP_STORE_CONNECT_ISSUER_ID" && exit 1)
          [ -n "${TEAM_ID:-}" ] || (echo "ERROR: Missing TEAM_ID" && exit 1)
          echo "All signing variables present"

      - name: Set up code signing
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          keychain initialize
          printf '%s' "$APP_STORE_CONNECT_KEY_CONTENT" | base64 --decode > /tmp/AuthKey.p8
          if [ -n "${CM_CERTIFICATE_PRIVATE_KEY:-}" ]; then
            printf '%s' "$CM_CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          else
            openssl genrsa -out /tmp/cert_key.pem 2048
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$(cat /tmp/AuthKey.p8)" \
            --certificate-key "$(cat /tmp/cert_key.pem)" \
            --create
          keychain add-certificates
          cd ios/App
          xcode-project use-profiles

      - name: Build IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/ios/App"
          if [ -d App.xcworkspace ]; then
            xcode-project build-ipa \
              --workspace App.xcworkspace \
              --scheme App \
              --archive-flags "CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=${TEAM_ID}"
          else
            xcode-project build-ipa \
              --project App.xcodeproj \
              --scheme App \
              --archive-flags "CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=${TEAM_ID}"
          fi

    artifacts:
      - /tmp/build/ios-release/ios/App/build/ios/ipa/*.ipa
      - /tmp/build/ios-release/ios/App/**/*.xcarchive

    publishing:
      scripts:
        - name: Notify build result
          script: |
            if [ "$CM_BUILD_STEP_STATUS" = "success" ]; then
              export STATUS="finished"
            else
              export STATUS="failed"
            fi
            PAYLOAD=$(python3 -c "
            import json, os, datetime
            print(json.dumps({
              'buildId': os.environ.get('CM_BUILD_ID', ''),
              'status': os.environ.get('STATUS', 'failed'),
              'platform': 'ios',
              'workflowId': 'ios-release',
              'environment': {'variables': {'USER_APP_ID': os.environ.get('USER_APP_ID', '')}},
              'artefacts': [{'url': os.environ.get('CM_ARTIFACT_LINKS', ''), 'type': 'ipa'}],
              'finishedAt': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
            }))
            ")
            curl -X POST "$SUPABASE_URL/functions/v1/codemagic-webhook" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"

  android-submit:
    name: Android Play Store Submission
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      java: 17

    scripts:
      - name: Download artifact
        script: |
          set -e
          mkdir -p artifacts
          curl -L -H "x-auth-token: $CODEMAGIC_API_TOKEN" -o artifacts/app.bin "$ARTIFACT_URL"
          if echo "$ARTIFACT_URL" | grep -qi '\.aab'; then
            mv artifacts/app.bin artifacts/app.aab
          else
            mv artifacts/app.bin artifacts/app.apk
          fi
          ls -la artifacts

      - name: Setup Google Play credentials
        script: |
          set -e
          printf '%s' "$GOOGLE_PLAY_JSON_KEY" | base64 --decode > google-play-key.json

      - name: Install Fastlane
        script: gem install fastlane

      - name: Setup Fastlane
        script: |
          set -e
          mkdir -p fastlane/metadata/android/en-US/changelogs
          echo "${APP_NAME:-My App}" > fastlane/metadata/android/en-US/title.txt
          echo "${SHORT_DESCRIPTION:-}" > fastlane/metadata/android/en-US/short_description.txt
          echo "${APP_DESCRIPTION:-}" > fastlane/metadata/android/en-US/full_description.txt
          echo "${RELEASE_NOTES:-Bug fixes and improvements}" > fastlane/metadata/android/en-US/changelogs/default.txt
          printf '%s\n' "default_platform(:android)" "" "platform :android do" "  lane :deploy do" "    artifact_path = File.exist?('../artifacts/app.aab') ? '../artifacts/app.aab' : '../artifacts/app.apk'" "    is_aab = artifact_path.end_with?('.aab')" "    upload_to_play_store(" "      package_name: ENV['PACKAGE_NAME']," "      json_key: '../google-play-key.json'," "      track: ENV['SUPPLY_TRACK'] || 'internal'," "      aab: is_aab ? artifact_path : nil," "      apk: is_aab ? nil : artifact_path," "      release_status: 'draft'," "      skip_upload_images: true," "      skip_upload_screenshots: true," "      skip_upload_metadata: false," "      metadata_path: 'metadata/android'" "    )" "  end" "end" > fastlane/Fastfile

      - name: Submit to Google Play
        script: |
          set -e
          cd fastlane
          fastlane android deploy

    publishing:
      scripts:
        - name: Update submission status
          script: |
            if [ "$CM_BUILD_STEP_STATUS" = "success" ]; then
              STATUS="submitted"
            else
              STATUS="failed"
            fi
            curl -X POST "$SUPABASE_URL/functions/v1/store-submission-webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -d "{\"submissionId\":\"$SUBMISSION_ID\",\"status\":\"$STATUS\",\"platform\":\"android\",\"buildId\":\"$CM_BUILD_ID\"}"

  ios-submit:
    name: iOS App Store Submission
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Download IPA artifact
        script: |
          set -e
          mkdir -p artifacts
          curl -L -H "x-auth-token: $CODEMAGIC_API_TOKEN" -o artifacts/app.ipa "$ARTIFACT_URL"
          ls -la artifacts

      - name: Validate submission variables
        script: |
          set -e
          [ -n "${APP_STORE_CONNECT_API_KEY_CONTENT:-}" ] || (echo "Missing APP_STORE_CONNECT_API_KEY_CONTENT" && exit 1)
          [ -n "${APP_STORE_CONNECT_API_KEY_ID:-}" ] || (echo "Missing APP_STORE_CONNECT_API_KEY_ID" && exit 1)
          [ -n "${APP_STORE_CONNECT_ISSUER_ID:-}" ] || (echo "Missing APP_STORE_CONNECT_ISSUER_ID" && exit 1)

      - name: Setup App Store Connect credentials
        script: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          printf '{"key_id":"%s","issuer_id":"%s","key_filepath":"%s/.appstoreconnect/private_keys/AuthKey_%s.p8"}' "$APP_STORE_CONNECT_API_KEY_ID" "$APP_STORE_CONNECT_ISSUER_ID" "$HOME" "$APP_STORE_CONNECT_API_KEY_ID" > /tmp/api_key.json

      - name: Install Fastlane
        script: gem install fastlane

      - name: Upload to TestFlight
        script: |
          set -e
          fastlane pilot upload \
            --ipa artifacts/app.ipa \
            --api_key_path /tmp/api_key.json \
            --skip_waiting_for_build_processing

    publishing:
      scripts:
        - name: Update submission status
          script: |
            if [ "$CM_BUILD_STEP_STATUS" = "success" ]; then
              STATUS="submitted"
            else
              STATUS="failed"
            fi
            curl -X POST "$SUPABASE_URL/functions/v1/store-submission-webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -d "{\"submissionId\":\"$SUBMISSION_ID\",\"status\":\"$STATUS\",\"platform\":\"ios\",\"buildId\":\"$CM_BUILD_ID\"}"
